<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Gallery - Ad Creative Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
  }
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #222;
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
  header .stats { font-size: 13px; color: #888; }
  .toolbar {
    padding: 12px 24px;
    display: flex; gap: 8px; align-items: center;
    border-bottom: 1px solid #1a1a1a;
  }
  .toolbar button {
    padding: 6px 14px; border-radius: 6px; border: 1px solid #333;
    background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 13px;
    transition: all 0.15s;
  }
  .toolbar button:hover { background: #2a2a2a; border-color: #555; }
  .toolbar button.active { background: #2563eb; border-color: #2563eb; color: #fff; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 20px;
    padding: 24px;
  }
  .card {
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #262626;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #444; }
  .card.approved { border-color: #22c55e; }
  .card.rejected { border-color: #ef4444; }
  .card-img {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #111;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .card-img img {
    width: 100%; height: 100%; object-fit: cover;
    transition: opacity 0.3s;
  }
  .card-img .placeholder {
    color: #444; font-size: 14px;
  }
  .card-img .loading {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #333; border-top-color: #2563eb;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .card-body { padding: 16px; }
  .card-num {
    font-size: 11px; color: #666; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
  }
  .card-hl {
    font-size: 18px; font-weight: 700; color: #f0f0f0;
    margin-bottom: 6px; line-height: 1.4;
  }
  .card-text { font-size: 13px; color: #999; line-height: 1.6; margin-bottom: 8px; }
  .card-cta {
    display: inline-block;
    padding: 6px 16px; border-radius: 6px;
    background: #2563eb; color: #fff;
    font-size: 13px; font-weight: 500;
    margin-bottom: 12px;
  }
  .card-prompt {
    font-size: 11px; color: #555; line-height: 1.5;
    border-top: 1px solid #262626; padding-top: 10px; margin-top: 4px;
    display: none;
  }
  .card.show-prompt .card-prompt { display: block; }
  .card-actions {
    display: flex; gap: 6px; padding: 0 16px 16px;
  }
  .card-actions button {
    flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #333;
    background: #111; color: #ccc; cursor: pointer; font-size: 12px;
    font-weight: 500; transition: all 0.15s;
  }
  .card-actions button:hover { background: #222; }
  .card-actions .btn-regen { border-color: #2563eb; color: #60a5fa; }
  .card-actions .btn-regen:hover { background: #1e3a5f; }
  .card-actions .btn-regen:disabled { opacity: 0.4; cursor: not-allowed; }
  .card-actions .btn-ok { border-color: #22c55e; color: #4ade80; }
  .card-actions .btn-ok:hover { background: #14532d; }
  .card-actions .btn-ng { border-color: #ef4444; color: #f87171; }
  .card-actions .btn-ng:hover { background: #450a0a; }
  .card-actions .btn-prompt { border-color: #555; color: #888; }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #1e3a5f; color: #60a5fa; padding: 12px 20px;
    border-radius: 8px; font-size: 13px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    z-index: 200;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>QC Gallery</h1>
  <div class="stats" id="stats">Loading...</div>
</header>
<div class="toolbar">
  <button class="active" data-filter="all">All</button>
  <button data-filter="pending">Pending</button>
  <button data-filter="approved">Approved</button>
  <button data-filter="rejected">Rejected</button>
  <button id="btn-regen-all" style="margin-left:auto; background:#2563eb; border-color:#2563eb; color:#fff;">
    Generate All Missing
  </button>
</div>
<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>

<script>
const grid = document.getElementById('grid');
const toast = document.getElementById('toast');
const stats = document.getElementById('stats');
let briefs = [];
let cardStates = {}; // { id: 'pending'|'approved'|'rejected' }

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function updateStats() {
  const a = Object.values(cardStates).filter(s => s === 'approved').length;
  const r = Object.values(cardStates).filter(s => s === 'rejected').length;
  const p = briefs.length - a - r;
  stats.textContent = `Total: ${briefs.length}  |  Pending: ${p}  |  ✓ ${a}  |  ✗ ${r}`;
}

function applyFilter(filter) {
  document.querySelectorAll('.card').forEach(card => {
    const id = parseInt(card.dataset.id);
    const state = cardStates[id] || 'pending';
    card.style.display = (filter === 'all' || filter === state) ? '' : 'none';
  });
}

function renderCards() {
  grid.innerHTML = '';
  briefs.forEach(b => {
    cardStates[b.id] = cardStates[b.id] || 'pending';
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = b.id;
    const imgFile = `/images/${String(b.id).padStart(2,'0')}.jpg`;
    card.innerHTML = `
      <div class="card-img" id="img-wrap-${b.id}">
        <img src="${imgFile}" onerror="this.style.display='none'; this.nextElementSibling.style.display=''" style="display:block">
        <div class="placeholder" style="display:none">No image — click Regen</div>
      </div>
      <div class="card-body">
        <div class="card-num">Creative #${String(b.id).padStart(2,'0')}</div>
        <div class="card-hl">${b.headline}</div>
        <div class="card-text">${b.body}</div>
        <div class="card-cta">${b.cta}</div>
        <div class="card-prompt">Prompt: ${b.prompt}</div>
      </div>
      <div class="card-actions">
        <button class="btn-regen" onclick="regen(${b.id}, this)">↻ Regen</button>
        <button class="btn-ok" onclick="setStatus(${b.id}, 'approved')">✓ OK</button>
        <button class="btn-ng" onclick="setStatus(${b.id}, 'rejected')">✗ NG</button>
        <button class="btn-prompt" onclick="togglePrompt(${b.id})">Prompt</button>
      </div>
    `;
    grid.appendChild(card);
  });
  updateStats();
}

function setStatus(id, status) {
  cardStates[id] = status;
  const card = document.querySelector(`.card[data-id="${id}"]`);
  card.classList.remove('approved', 'rejected');
  if (status !== 'pending') card.classList.add(status);
  updateStats();
  showToast(`#${String(id).padStart(2,'0')} → ${status}`);
}

function togglePrompt(id) {
  document.querySelector(`.card[data-id="${id}"]`).classList.toggle('show-prompt');
}

async function regen(id, btn) {
  btn.disabled = true;
  btn.textContent = '⏳ Generating...';
  const wrap = document.getElementById(`img-wrap-${id}`);
  // Show loading overlay
  let loader = wrap.querySelector('.loading');
  if (!loader) {
    loader = document.createElement('div');
    loader.className = 'loading';
    loader.innerHTML = '<div class="spinner"></div>';
    wrap.appendChild(loader);
  }
  loader.style.display = 'flex';

  try {
    const resp = await fetch(`/api/regen?num=${id}`);
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'API error');

    // Refresh image with cache-bust
    const img = wrap.querySelector('img');
    img.src = data.path + '?t=' + Date.now();
    img.style.display = 'block';
    wrap.querySelector('.placeholder').style.display = 'none';
    showToast(`#${String(id).padStart(2,'0')} regenerated!`);
  } catch (e) {
    showToast(`Error: ${e.message}`);
  } finally {
    loader.style.display = 'none';
    btn.disabled = false;
    btn.textContent = '↻ Regen';
  }
}

async function regenAll() {
  const btn = document.getElementById('btn-regen-all');
  btn.disabled = true;
  btn.textContent = 'Generating...';
  for (const b of briefs) {
    const imgFile = `/images/${String(b.id).padStart(2,'0')}.jpg`;
    try {
      const check = await fetch(imgFile, { method: 'HEAD' });
      if (check.ok) continue; // skip existing
    } catch {}
    const regenBtn = document.querySelector(`.card[data-id="${b.id}"] .btn-regen`);
    await regen(b.id, regenBtn);
  }
  btn.disabled = false;
  btn.textContent = 'Generate All Missing';
  showToast('All missing images generated!');
}

// Filter buttons
document.querySelectorAll('.toolbar button[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toolbar button[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(btn.dataset.filter);
  });
});

document.getElementById('btn-regen-all').addEventListener('click', regenAll);

// Init
fetch('/api/briefs').then(r => r.json()).then(data => {
  briefs = data;
  renderCards();
});
</script>
</body>
</html>
