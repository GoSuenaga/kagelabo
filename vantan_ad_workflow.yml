          ,\n        \"\u7537\u6027\": \"onwK4e9ZLuTAKqWW03F9\",\n        \"\u7537\
          \u306E\u5B50\": \"pFZP5JQG7iQjIQuC4Bku\",\n        \"\u304A\u3058\u3055\u3093\
          \": \"nPczCjzI2devNBz1zQrb\",\n        \"\u602A\u7363\": \"TX3LPaxmHKxFdv7VOQHJ\"\
          ,\n        \"\u30AD\u30E3\u30E9\u30AF\u30BF\u30FC\": \"pqHfZKP75CvOlQylNhV4\"\
          \n    }\n    voice_id = voice_map.get(voice_label, \"jBpfuIE2acCO8z3wKNLl\"\
          )\n    return {\"voice_id\": voice_id}"
        code_language: python3
