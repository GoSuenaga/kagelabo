    # ============================================================
    # 3. スクール情報抽出（CSVパース・フィルタリング）
    # ============================================================
    - data:
        code: "import csv\nfrom io import StringIO\n\ndef main(file_list: list, product_name:\
          \ str, batch_mode: str) -> dict:\n    if not file_list or len(file_list)\
          \ == 0:\n        return {\"schools\": [], \"count\": 0}\n    \n    file_url\
          \ = file_list[0]['url']\n    import requests\n    response = requests.get(file_url)\n\
          \    response.encoding = 'utf-8'\n    \n    f = StringIO(response.text)\n\
          \    reader = csv.reader(f)\n    data = list(reader)\n    \n    if len(data)\
          \ < 2:\n        return {\"schools\": [], \"count\": 0}\n    \n    headers\
          \ = data[0]\n    school_list = []\n    \n    for row in data[1:]:\n     \
          \   if len(row) < 4:\n            continue\n        row_data = {\n      \
          \      \"school_name\": row[0] if len(row) > 0 else \"\",\n            \"\
          school_overview\": row[1] if len(row) > 1 else \"\",\n            \"appeal_points\"\
          : row[2] if len(row) > 2 else \"\",\n            \"key_message\": row[3]\
          \ if len(row) > 3 else \"\",\n            \"target_audience\": row[4] if\
          \ len(row) > 4 else \"\",\n            \"brand_tone\": row[5] if len(row)\
          \ > 5 else \"\"\n        }\n        if batch_mode == \"\u5168\u30B9\u30AF\
          \u30FC\u30EB\":\n            school_list.append(row_data)\n        elif row_data[\"\
          school_name\"] == product_name:\n            school_list.append(row_data)\n\
          \    \n    return {\"schools\": school_list, \"count\": len(school_list)}"
        code_language: python3
        outputs:
          schools:
            children: null
            type: array[object]
          count:
            children: null
            type: number
        selected: false
        title: スクール情報抽出
        type: code
        variables:
        - value_selector:
          - '1900000000002'
          - files
          value_type: array[file]
          variable: file_list
        - value_selector:
          - '1900000000001'
          - product_name
          value_type: string
          variable: product_name
        - value_selector:
          - '1900000000001'
          - batch_mode
          value_type: string
          variable: batch_mode
