    # ============================================================
    # 7. 漢数字化/スクリプト分割（コピーテキストをセグメント化）
    # ============================================================
    - data:
        code: "import re\n\ndef main(script: str) -> dict:\n    kansuji_map = {\n\
          \        '0': '\uFF10', '1': '\uFF11', '2': '\uFF12', '3': '\uFF13',\n \
          \       '4': '\uFF14', '5': '\uFF15', '6': '\uFF16', '7': '\uFF17',\n  \
          \      '8': '\uFF18', '9': '\uFF19'\n    }\n    converted = ''.join(kansuji_map.get(c,\
          \ c) for c in script)\n    \n    segments = re.split(r'[\u3001\u3002!\\?\uFF01\uFF1F]',\
          \ converted)\n    audio_segments = [s.strip() for s in segments if s.strip()]\n\
          \    caption_segments = [s.strip() for s in segments if s.strip()]\n    \n\
          \    return {\n        \"audio_segments\": audio_segments,\n        \"caption_segments\"\
          : caption_segments\n    }"
        code_language: python3
        outputs:
          audio_segments:
            children: null
            type: array[string]
          caption_segments:
            children: null
            type: array[string]
        selected: false
        title: 漢数字化/スクリプト分割
        type: code
        variables:
        - value_selector:
          - '1900000000006'
          - text
          value_type: string
          variable: script
      height: 52
      id: '1900000000007'
      parentId: '1900000000005'
      position:
        x: 420
        y: 100
      positionAbsolute:
        x: 1680
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
