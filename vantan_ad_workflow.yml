    # ============================================================
    # 6. 広告コピー生成（Gemini LLM - 省略なし全文出力）
    # ============================================================
    - data:
        context:
          enabled: false
          variable_selector: []
        model:
          completion_params:
            temperature: 0.8
          mode: chat
          name: gemini-2.5-flash
          provider: langgenius/gemini/google
        prompt_template:
        - id: ad-copy-system-prompt
          role: system
          text: 'あなたはプロの広告コピーライターです。バンタン（VANTAN）の各スクール向けに、広告動画用のナレーションコピーを生成してください。

            【重要な制約】
            - 文字の省略は一切しないでください
            - 全文を完全に出力してください
            - 文字数制限はありません
            - 自然な話し言葉で、動画ナレーションに適した文体にしてください
            - 「、」「。」「!」「？」を境目にカットが切り替わります'
        - id: ad-copy-user-prompt
          role: user
          text: "以下のスクール情報をもとに、広告動画用のナレーションコピーを生成してください。\n\n\
            【スクール情報】\n\
            - スクール名: {{school_name}}\n\
            - スクール概要: {{school_overview}}\n\
            - 訴求ポイント: {{appeal_points}}\n\
            - キーメッセージ: {{key_message}}\n\
            - ターゲット層: {{target_audience}}\n\
            - ブランドトーン: {{brand_tone}}\n\n\
            【出力形式】\n\
            ナレーション全文のみを出力してください。セクション分けや見出しは不要です。\n\
            省略せず、必ず全文を出力してください。"
        selected: false
        title: 広告コピー生成
        type: llm
        vision:
          enabled: false
