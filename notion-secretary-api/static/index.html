<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#0d0d0d">
  <title>KAGE</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="header-icon">影</span>
      <div>
        <div class="header-title">KAGE <span class="ver-badge">v0.6</span></div>
        <div class="header-sub" id="headerDate">Go's Shadow</div>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="btnCopyLog" title="会話ログをコピー">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
      <button class="icon-btn" id="btnModel" title="モデル切り替え">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      </button>
      <button class="icon-btn" id="btnReload" title="更新">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button class="icon-btn" id="btnUpcoming" title="今後の予定">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </button>
    </div>
  </header>

  <!-- Chat -->
  <main class="chat" id="chatArea"></main>

  <!-- Model Modal -->
  <div class="modal-overlay" id="modelModal">
    <div class="modal-sheet">
      <div class="modal-bar"></div>
      <h3 class="modal-title">🤖 AIモデル切り替え</h3>
      <div id="modelList" class="model-list">
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
      <div class="modal-actions">
        <button class="btn-primary full" id="modelClose">閉じる</button>
      </div>
    </div>
  </div>

  <!-- Schedule Modal -->
  <div class="modal-overlay" id="scheduleModal">
    <div class="modal-sheet">
      <div class="modal-bar"></div>
      <h3 class="modal-title">📅 予定を追加</h3>
      <div class="form-group">
        <label>タイトル <span class="req">*</span></label>
        <input type="text" id="schedTitle" placeholder="例: クライアント定例" autocomplete="off">
      </div>
      <div class="form-group">
        <label>日付 <span class="req">*</span></label>
        <input type="date" id="schedDate">
      </div>
      <div class="form-group">
        <label>メモ</label>
        <input type="text" id="schedMemo" placeholder="任意" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" id="modalCancel">キャンセル</button>
        <button class="btn-primary" id="modalSave">保存する</button>
      </div>
    </div>
  </div>

  <!-- Upcoming Modal -->
  <div class="modal-overlay" id="upcomingModal">
    <div class="modal-sheet">
      <div class="modal-bar"></div>
      <h3 class="modal-title">📆 今後の予定</h3>
      <div id="upcomingBody" class="upcoming-body">
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
      <div class="modal-actions">
        <button class="btn-primary full" id="upcomingClose">閉じる</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="qa-row">
      <button class="qa" data-action="memo">📝<span>メモ</span></button>
      <button class="qa" data-action="idea">💡<span>アイデア</span></button>
      <button class="qa" data-action="schedule">📅<span>予定</span></button>
      <button class="qa" data-action="brain">🧠<span>整理</span></button>
    </div>
    <div id="imagePreview" class="image-preview hidden">
      <img id="previewImg" src="" alt="preview">
      <button id="removeImage" class="remove-img">&times;</button>
    </div>
    <div class="input-row">
      <button class="input-icon-btn" id="btnImage" title="画像を送る">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      </button>
      <input type="file" id="imageInput" accept="image/*" capture="environment" style="display:none">
      <textarea id="msgInput" placeholder="話しかける…" rows="1"></textarea>
      <button class="input-icon-btn" id="btnMic" title="音声入力">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button class="send-btn" id="btnSend">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
