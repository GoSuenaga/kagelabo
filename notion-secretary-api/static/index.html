<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Go_KAGE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 12px 16px;
    background: #111;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }
  .header .status {
    font-size: 11px;
    color: #666;
  }
  .think-btn {
    background: #1a1a2e;
    border: 1px solid #333;
    color: #a78bfa;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .think-btn:active { background: #2a2a4e; }
  .think-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    -webkit-overflow-scrolling: touch;
  }
  .msg {
    max-width: 85%;
    margin-bottom: 12px;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg.user {
    background: #1e3a5f;
    margin-left: auto;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-bottom-left-radius: 4px;
  }
  .msg img {
    max-width: 200px;
    border-radius: 8px;
    margin-top: 8px;
    display: block;
  }

  /* Think result */
  .think-result {
    background: #111;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .think-result .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #a78bfa;
    margin-bottom: 4px;
    margin-top: 12px;
  }
  .think-result .section-title:first-child { margin-top: 0; }
  .think-result .highlight {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }
  .think-result .item {
    font-size: 14px;
    color: #ccc;
    padding: 2px 0;
  }

  /* Input area */
  .input-area {
    padding: 8px 12px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    background: #111;
    border-top: 1px solid #222;
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .image-btn {
    background: none;
    border: none;
    color: #666;
    font-size: 24px;
    cursor: pointer;
    padding: 8px;
    flex-shrink: 0;
  }
  .image-btn:active { color: #a78bfa; }
  .input-area textarea {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 20px;
    color: #e0e0e0;
    padding: 10px 16px;
    font-size: 15px;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
  }
  .input-area textarea::placeholder { color: #555; }
  .send-btn {
    background: #a78bfa;
    border: none;
    color: #000;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Image preview */
  .image-preview {
    display: none;
    padding: 4px 12px;
    background: #111;
  }
  .image-preview.active { display: flex; align-items: center; gap: 8px; }
  .image-preview img {
    width: 48px;
    height: 48px;
    object-fit: cover;
    border-radius: 8px;
  }
  .image-preview .remove-img {
    background: none;
    border: none;
    color: #f66;
    font-size: 20px;
    cursor: pointer;
  }

  .loading { color: #666; font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <h1>Go_KAGE</h1>
  <button class="think-btn" id="thinkBtn" onclick="doThink()">&#129504; &#25972;&#29702;</button>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="image-preview" id="imagePreview">
  <img id="previewImg" src="" alt="preview">
  <span style="color:#999;font-size:13px">&#30011;&#20687;&#28155;&#20184;</span>
  <button class="remove-img" onclick="removeImage()">&times;</button>
</div>

<div class="input-area">
  <button class="image-btn" onclick="document.getElementById('imageInput').click()">&#128247;</button>
  <input type="file" id="imageInput" accept="image/*" capture="environment" style="display:none" onchange="handleImage(event)">
  <textarea id="msgInput" placeholder="&#12513;&#12483;&#12475;&#12540;&#12472;&#12434;&#20837;&#21147;..." rows="1" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#9650;</button>
</div>

<script src="/static/app.js"></script>
</body>
</html>
