          ?dl=0\", \"?dl=1\")\n            elif SE_Other_URLs and other_se_idx < len(SE_Other_URLs):\n\
          \                se_url = SE_Other_URLs[other_se_idx].replace(\"?dl=0\"\
          , \"?dl=1\")\n                other_se_idx += 1\n            if se_url:\
          \ scene_elements.append({\"type\": \"audio\", \"source\": se_url, \"duration\"\
