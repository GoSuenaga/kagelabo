          \                lines = [line.strip() for line in formatted_text.split(chr(10)) if line.strip()]\n\
          \                if not lines: lines = [display_text.strip()]\n                y_positions = {1: [\"50%\"], 2: [\"46%\", \"54%\"], 3: [\"42%\", \"50%\", \"58%\"]}.get(len(lines), [\"50%\"])\n\
          \                for idx, line in enumerate(lines):\n                    if idx >= len(y_positions): break\n\
