          : 1, \"elements\": scene_elements}\n            if i > 0: scene[\"transition\"\
          ] = {\"type\": \"crossfade\", \"duration\": overlap_duration}\n        \
          \    elements.append(scene)\n        except:\n            continue\n\n \
          \   if BGM_Source:\n        elements.append({\"type\": \"audio\", \"source\"\
          : BGM_Source.replace(\"?dl=0\", \"?dl=1\"), \"duration\": \"100%\", \"volume\"\
          : \"11%\", \"audio_fade_out\": 2})\n\n    if safe_annotation:\n        elements.append({\n\
