    - data:
        code: "import requests\nimport random\n\ndef get_se_link(token, path):\n \
          \   headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}\n\
          \    res = requests.post('https://api.dropboxapi.com/2/files/list_folder',\
          \ headers=headers, json={\"path\": path})\n    if res.status_code != 200:\
          \ return \"\"\n    files = [f for f in res.json().get('entries', []) if\
          \ f.get('.tag') == 'file']\n    if not files: return \"\"\n    selected\
          \ = random.choice(files)['path_lower']\n    res_link = requests.post('https://api.dropboxapi.com/2/files/get_temporary_link',\
          \ headers=headers, json={\"path\": selected})\n    return res_link.json().get('link',\
          \ '') if res_link.status_code == 200 else \"\"\n\ndef get_multiple_se_links(token,\
          \ path, count):\n    headers = {'Authorization': f'Bearer {token}', 'Content-Type':\
          \ 'application/json'}\n    res = requests.post('https://api.dropboxapi.com/2/files/list_folder',\
          \ headers=headers, json={\"path\": path})\n    if res.status_code != 200:\
          \ return []\n    files = [f for f in res.json().get('entries', []) if f.get('.tag')\
          \ == 'file']\n    if not files: return []\n    \n    # シャッフルして被りなしでカット数分取得（ファイル数上限でストップ）\n\
          \    random.shuffle(files)\n    selected_files = files[:count]\n    \n \
          \   links = []\n    for f in selected_files:\n        res_link = requests.post('https://api.dropboxapi.com/2/files/get_temporary_link',\
          \ headers=headers, json={\"path\": f['path_lower']})\n        if res_link.status_code\
          \ == 200:\n            links.append(res_link.json().get('link', ''))\n \
          \   return links\n\ndef main(token: str, segments: list) -> dict:\n    cut_count\
          \ = len(segments) if segments else 5\n    return {\n        \"se_start\"\
          : get_se_link(token, \"/冒頭\"),\n        \"se_product\": get_se_link(token,\
          \ \"/商材名\"),\n        \"se_other\": get_multiple_se_links(token, \"/他スクリプト\"\
          , cut_count)\n    }"
        code_language: python3
