    - data:
        code: "import requests\nimport csv\nimport random\nfrom io import StringIO\n\
          \ndef main(file_list: list, segments: list) -> dict:\n    if not file_list\
          \ or len(file_list) == 0:\n        return {\"result\": \"エラー: ファイルが見つかりません\"\
          }\n    \n    # 必要なカット数（音声のセグメント数）\n    scene_count = len(segments) if segments\
          \ else 1\n    \n    file_url = file_list[0]['url']\n    response = requests.get(file_url)\n\
          \    response.encoding = 'utf-8'\n    \n    f = StringIO(response.text)\n\
          \    reader = csv.reader(f)\n    data = list(reader)\n    \n    if len(data)\
          \ < 2:\n        return {\"result\": \"エラー: CSVのデータが空です\"}\n        \n  \
          \  headers = data[0]  # ジャンル名\n    rows = data[1:]    # プロンプト本体\n    \n\
          \    # 全ての有効なプロンプトを「(ジャンル名) プロンプト内容」の形式で1つのリストにまとめる\n    all_pool = []\n\
          \    for col_idx, genre in enumerate(headers):\n        for row in rows:\n\
          \            if len(row) > col_idx and row[col_idx].strip():\n         \
          \       all_pool.append(f\"[{genre}] {row[col_idx].strip()}\")\n    \n \
          \   # 【改善の核】リスト全体をランダムにシャッフルする\n    random.shuffle(all_pool)\n    \n   \
          \ selected_templates = []\n    for i in range(scene_count):\n        if\
          \ i < len(all_pool):\n            # シャッフルされたリストから順番に取り出す（重複しない）\n      \
          \      selected_templates.append(all_pool[i])\n        else:\n         \
          \   # 万が一、スプレッドシートの総行数よりカット数が多い場合は、\n            # 再度シャッフルして再利用する\n    \
          \        random.shuffle(all_pool)\n            selected_templates.append(all_pool[0])\n\
          \            \n    result_str = \"\\n\".join([f\"Template {i+1}: {t}\" for\
          \ i, t in enumerate(selected_templates)])\n    \n    return {\"result\"\
          : result_str}"
        code_language: python3
