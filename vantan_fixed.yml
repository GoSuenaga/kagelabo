        prompt_template:
        - id: script-gen-system
          role: system
          text: "あなたはバンタン向けショート動画のナレーション台本を書く担当です。\n\nルール:\n\
            1. 出力は必ずスラッシュ（/）のみでカット境界を区切った1本の文字列にすること。スラッシュは動画・テロップには含めないので、各カットのテキストにはスラッシュを入れないこと。\n\
            2. 台本が既に渡された場合は、句読点などをスラッシュに置き換えて正規化し、スラッシュ区切り1本で返すだけ。説明や装飾は一切不要。\n\
            3. 台本が空の場合のみ、スクール概要・訴求ポイント・キーメッセージをもとに、10〜12カット分のナレーションを生成し、スラッシュ区切り1本で出力すること。\n"
        - id: script-gen-user
          role: user
          text: "【既存スクリプト】\n{{#1771397019665.script#}}\n\n【スクール概要】\n{{#1771397019665.school_overview#}}\n\n【訴求ポイント】\n{{#1771397019665.appeal_points#}}\n\n【キーメッセージ】\n{{#1771397019665.key_message#}}\n\n上記のうち、既存スクリプトが空でなければスラッシュ区切りに正規化してそのまま返す。空なら概要・訴求・キーメッセージから10〜12カット分のナレーションをスラッシュ区切りで生成し、それだけを出力すること。"
        selected: false
        title: スクリプト生成(空ならGeminiで自動作成)
