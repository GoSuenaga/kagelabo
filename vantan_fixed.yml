    - data:
        code: "import re\n\ndef int_to_kanji(n):\n    kanji_nums = ['', '一', '二',\
          \ '三', '四', '五', '六', '七', '八', '九']\n    units = ['', '十', '百', '千']\n\
          \    if n == 0: return '零'\n    res = \"\"\n    for i in range(4):\n   \
          \     digit = n % 10\n        if digit > 0:\n            unit = units[i]\n\
          \            num = kanji_nums[digit]\n            if digit == 1 and i >\
          \ 0: num = \"\"\n            res = num + unit + res\n        n //= 10\n\
          \    return res\n\ndef main(script: str) -> dict:\n    # 1. クリーニング（スラッシュはカット境界のため保持）\n\
          \    clean_script = script.replace('\"', '').replace('\\\\', '').strip()\n\
          \    clean_script = clean_script.replace('\\\\n', ' ').replace('\\n', ' ')\n\
          \    \n    # 2. スラッシュ（/）のみで分割。スラッシュは動画・テロップに含めない\n    raw_segments = [s.strip() for s in clean_script.split('/') if s.strip()]\n\
          \    base_segments = raw_segments\n    \n    audio_list = []\n    for seg in base_segments:\n\
          \        def replace_match(match):\n            return int_to_kanji(int(match.group()))\n\
          \        converted = re.sub(r'\\d{1,4}', replace_match, seg)\n        audio_list.append(converted)\n\
          \    \n    return {\n        \"audio_segments\": audio_list,\n        \"caption_segments\"\
          : base_segments\n    }"
